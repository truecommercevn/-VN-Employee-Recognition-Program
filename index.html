<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VN Employee Recognition Program</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1f44;
    --navy-mid: #12306b;
    --blue: #1a4fae;
    --blue-light: #e8eef8;
    --gold: #f0a800;
    --gold-light: #fff8e6;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --white: #ffffff;
    --bg: #f4f6fb;
    --tag-own: #e0f0ff;
    --tag-own-c: #1a5faf;
    --tag-col: #e6f9f0;
    --tag-col-c: #0d7a50;
    --tag-inn: #fff3e0;
    --tag-inn-c: #b45000;
    --tag-cus: #fce4f6;
    --tag-cus-c: #8b1a7e;
    --radius: 12px;
    --shadow: 0 2px 16px rgba(10,31,68,.08);
    --shadow-lg: 0 8px 32px rgba(10,31,68,.13);
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

  /* HERO */
  .hero {
    background: linear-gradient(120deg, #0B2545 0%, #102A56 55%, #0E3A6E 100%);
    min-height: 260px;
    display: flex;
    align-items: center;
    padding: 48px 64px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(240,168,0,.13) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-dots {
    position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .hero-content { flex: 1; position: relative; z-index: 1; }
  .hero-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(125,211,252,.3);
    padding: 6px 18px 6px 14px; border-radius: 24px;
    color: #7DD3FC; font-size: .72rem; font-weight: 600;
    letter-spacing: .15em; margin-bottom: 20px;
    font-family: 'DM Sans', sans-serif;
  }
  .hero-pill::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #7DD3FC; box-shadow: 0 0 10px rgba(125,211,252,.7);
  }
  .hero h1 {
    font-family: 'Sora', sans-serif;
    font-size: 3rem; font-weight: 800; line-height: 1.1;
    color: #fff; letter-spacing: -.015em;
    text-shadow: 0 2px 20px rgba(0,0,0,.3);
  }
  .hero-title-line1 { display: block; color: #fff; }
  .hero-title-line2 {
    display: block;
    background-image: linear-gradient(90deg, #ffffff 0%, #7DD3FC 55%, #00A7E1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .hero-accent { display: block; width: 56px; height: 4px; background: linear-gradient(90deg, #00A7E1, #7DD3FC); border-radius: 2px; margin: 16px 0; }
  .hero p { color: rgba(255,255,255,.78); font-size: 1rem; max-width: 480px; line-height: 1.6; }
  .medal-placeholder {
    width: 240px; height: 240px; flex-shrink: 0; position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .medal-svg { width: 100%; height: 100%; filter: drop-shadow(0 12px 30px rgba(240,168,0,.35)); }

  /* MAIN */
  .main { max-width: 100%; margin: 0 auto; padding: 32px 20px; display: flex; flex-direction: column; gap: 28px; }

  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 24px; animation: fadeUp .5s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  .sec-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
  .sec-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--navy); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sec-icon svg { width: 24px; height: 24px; color: #fff; fill: none; stroke: currentColor; stroke-width: 1.8; }
  .sec-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--navy); }
  .sec-sub { font-size: .875rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  .rewards { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
  .reward-pill { display: flex; align-items: center; gap: 10px; background: var(--blue-light); border-radius: 8px; padding: 10px 18px; }
  .reward-pill svg { width: 22px; height: 22px; color: var(--blue); flex-shrink: 0; }
  .reward-amount { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
  .reward-label { font-size: .75rem; color: var(--muted); }

  .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab { padding: 8px 20px; border-radius: 6px; font-size: .875rem; font-weight: 500; cursor: pointer; border: none; background: #eef1f7; color: var(--muted); transition: all .18s; user-select: none; }
  .tab.active { background: var(--navy); color: #fff; }
  .tab:hover:not(.active) { background: #d8dde7; color: var(--navy); }

  .emp-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
  .emp-card { background: var(--bg); border-radius: 10px; padding: 16px 10px; text-align: center; transition: transform .18s, box-shadow .18s; cursor: pointer; border: 1.5px solid transparent; width: 130px; flex-shrink: 0; }
  .emp-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--blue-light); }
  .emp-avatar-placeholder { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--navy); border: 2.5px solid var(--white); box-shadow: 0 2px 8px rgba(10,31,68,.12); position: relative; overflow: hidden; }
  .emp-avatar-placeholder img, .mover-avatar-placeholder img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .emp-name { font-size: .825rem; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
  .emp-role { font-size: .7rem; color: var(--muted); margin-bottom: 2px; }
  .emp-dept { font-size: .68rem; color: var(--blue); font-weight: 500; }
  .note { font-size: .75rem; color: var(--muted); margin-top: 16px; display: flex; align-items: center; gap: 6px; }
  .note svg { width: 14px; height: 14px; flex-shrink: 0; }

  .empty-state { flex-basis: 100%; width: 100%; text-align: center; padding: 48px 24px; color: var(--muted); background: var(--bg); border-radius: 10px; border: 1.5px dashed var(--border); }
  .empty-state-title { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .empty-state-sub { font-size: .85rem; }

  .mover-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
  .mover-card { background: var(--bg); border-radius: 10px; padding: 18px; transition: transform .18s, box-shadow .18s; cursor: pointer; border: 1.5px solid transparent; width: 250px; flex-shrink: 0; }
  .mover-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--blue-light); }
  .mover-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .mover-avatar-placeholder { width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--navy); border: 2px solid var(--white); box-shadow: 0 2px 8px rgba(10,31,68,.1); position: relative; overflow: hidden; }
  .mover-name { font-size: .9rem; font-weight: 600; color: var(--navy); }
  .mover-role { font-size: .72rem; color: var(--muted); }
  .mover-dept { font-size: .72rem; color: var(--blue); font-weight: 500; margin-top: 1px; }
  .value-tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 600; margin-bottom: 10px; }
  .tag-own { background: var(--tag-own); color: var(--tag-own-c); }
  .tag-col { background: var(--tag-col); color: var(--tag-col-c); }
  .tag-inn { background: var(--tag-inn); color: var(--tag-inn-c); }
  .tag-cus { background: var(--tag-cus); color: var(--tag-cus-c); }
  .mover-desc { font-size: .78rem; color: #4b5563; line-height: 1.55; }

  .values-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .values-label { font-size: .8rem; font-weight: 600; color: var(--muted); }
  .val-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: .78rem; font-weight: 500; background: var(--blue-light); color: var(--navy); }
  .val-chip svg { width: 14px; height: 14px; }

  .values-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
  .value-card { background: var(--bg); border-radius: 10px; padding: 22px 14px; text-align: center; border: 1.5px solid var(--border); transition: border-color .18s, transform .18s; width: 200px; flex-shrink: 0; }
  .value-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .value-icon-wrap { width: 52px; height: 52px; border-radius: 14px; background: var(--navy); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
  .value-icon-wrap svg { width: 26px; height: 26px; color: #fff; fill: none; stroke: currentColor; stroke-width: 1.6; }
  .value-name { font-size: .95rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .value-def { font-size: .78rem; color: #4b5563; line-height: 1.5; }

  .years-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px 32px; }
  .years-header { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .years-info { display: flex; align-items: center; gap: 12px; flex: 1; }
  .years-icon { width: 40px; height: 40px; background: var(--navy); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .years-icon svg { width: 20px; height: 20px; color: #fff; fill: none; stroke: currentColor; stroke-width: 1.8; }
  .years-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .years-sub { font-size: .78rem; color: var(--muted); }
  .year-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .year-tab { padding: 7px 22px; border-radius: 6px; font-size: .875rem; font-weight: 600; cursor: pointer; border: none; }
  .year-tab.active { background: var(--navy); color: #fff; }
  .year-tab:not(.active) { background: #eef1f7; color: var(--muted); }
  .year-tab.empty { opacity: .55; cursor: default; }

  .footer-banner { background: linear-gradient(110deg, #071630 0%, #0e2d6e 100%); border-radius: var(--radius); padding: 40px 40px; text-align: center; position: relative; overflow: hidden; }
  .footer-banner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(240,168,0,.1) 0%, transparent 70%); }
  .footer-banner p { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: #fff; position: relative; z-index: 1; line-height: 1.4; }
  .footer-banner span { color: var(--gold); }

  .proficiency-section { margin-top: 8px; }
  .prof-header { margin-bottom: 20px; }
  .prof-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); }
  .prof-sub { font-size: .85rem; color: var(--muted); margin-top: 4px; }
  .prof-track { display: flex; align-items: center; gap: 0; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; }
  .prof-level { flex: 1; text-align: center; position: relative; }
  .prof-level:not(:last-child)::after { content: ''; position: absolute; top: 26px; right: -50%; width: 100%; height: 3px; background: linear-gradient(90deg, var(--navy) 0%, var(--blue) 100%); z-index: 0; }
  .prof-circle { width: 52px; height: 52px; border-radius: 50%; background: var(--navy); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; box-shadow: 0 0 0 4px var(--blue-light); }
  .prof-circle svg { width: 26px; height: 26px; color: #fff; fill: none; stroke: currentColor; stroke-width: 1.6; }
  .prof-name { font-size: .9rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .prof-desc { font-size: .75rem; color: var(--muted); line-height: 1.5; max-width: 140px; margin: 0 auto; }

  .av-1 { background: linear-gradient(135deg, #f5cba7, #e59866); }
  .av-2 { background: linear-gradient(135deg, #aed6f1, #5dade2); }
  .av-3 { background: linear-gradient(135deg, #a9dfbf, #27ae60); }
  .av-4 { background: linear-gradient(135deg, #d7bde2, #8e44ad); }
  .av-5 { background: linear-gradient(135deg, #fad7a0, #f39c12); }
  .av-6 { background: linear-gradient(135deg, #fadbd8, #e74c3c); }
  .av-7 { background: linear-gradient(135deg, #d5dbdb, #95a5a6); }
  .av-8 { background: linear-gradient(135deg, #a9cce3, #2980b9); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-content">
    <span class="hero-pill" id="hero-pill"></span>
    <h1>
      <span id="hero-title-line1" class="hero-title-line1"></span>
      <span id="hero-title-line2" class="hero-title-line2"></span>
    </h1>
    <span class="hero-accent"></span>
    <p id="hero-desc"></p>
  </div>
  <div class="medal-placeholder">
    <svg class="medal-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="md-gold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFE07A"/>
          <stop offset=".6" stop-color="#F5B82E"/>
          <stop offset="1" stop-color="#B7780E"/>
        </linearGradient>
        <linearGradient id="md-rib1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#00A7E1"/>
          <stop offset="1" stop-color="#0072C6"/>
        </linearGradient>
      </defs>
      <path d="M 78 26 L 110 26 L 130 130 L 98 130 Z" fill="url(#md-rib1)"/>
      <path d="M 162 26 L 130 26 L 110 130 L 142 130 Z" fill="#0B2545"/>
      <path d="M 78 26 L 94 26 L 86 44 Z" fill="#0072C6"/>
      <path d="M 162 26 L 146 26 L 154 44 Z" fill="#081B36"/>
      <circle cx="120" cy="156" r="62" fill="#B7780E"/>
      <circle cx="120" cy="156" r="58" fill="url(#md-gold)"/>
      <circle cx="120" cy="156" r="46" fill="none" stroke="#B7780E" stroke-width="2" opacity=".45"/>
      <path d="M 120 124 L 129 146 L 153 148 L 134.5 163 L 140 186 L 120 174 L 100 186 L 105.5 163 L 87 148 L 111 146 Z" fill="#0B2545"/>
      <path d="M 86 132 C 92 122 102 116 116 114 L 116 120 C 104 122 96 128 92 138 Z" fill="#FFF3C9" opacity=".7"/>
    </svg>
  </div>
</div>

<div class="main">

  <!-- TOP TALENT -->
  <div class="card">
    <div class="sec-header">
      <div class="sec-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="sec-title" id="talent-title"></div>
        <div class="sec-sub" id="talent-desc"></div>
      </div>
      <div class="rewards" id="talent-rewards" style="margin-bottom:0;margin-left:auto;flex-shrink:0;"></div>
    </div>
    <div class="tabs" id="talent-tabs"></div>
    <div class="emp-grid" id="talent-grid"></div>
    <div class="note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
      <span id="talent-note"></span>
    </div>
  </div>

  <!-- TOP MOVER -->
  <div class="card">
    <div class="sec-header">
      <div class="sec-icon" style="background: #12306b;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div>
        <div class="sec-title" id="mover-title"></div>
        <div class="sec-sub" id="mover-desc"></div>
      </div>
      <div class="rewards" id="mover-rewards" style="margin-bottom:0;margin-left:auto;flex-shrink:0;"></div>
    </div>
    <div class="tabs" id="mover-tabs"></div>
    <div class="values-bar">
      <span class="values-label">Core values:</span>
      <span class="val-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Ownership</span>
      <span class="val-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg> Collaboration</span>
      <span class="val-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M12 2a7 7 0 00-7 7c0 2.4 1.2 4.5 3 5.7V17h8v-2.3c1.8-1.2 3-3.3 3-5.7a7 7 0 00-7-7z"/></svg> Innovation</span>
      <span class="val-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg> Customer Focus</span>
    </div>
    <div class="mover-grid" id="mover-grid"></div>
    <div class="note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
      <span id="mover-note"></span>
    </div>
  </div>

  <!-- OUR VALUES -->
  <div class="card">
    <div class="sec-header" style="margin-bottom:20px;">
      <div class="sec-icon" style="background: #1a4fae;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
      </div>
      <div>
        <div class="sec-title" id="values-title"></div>
        <div class="sec-sub" id="values-desc"></div>
      </div>
    </div>
    <div class="values-grid" id="values-grid"></div>
  </div>

  <!-- EXPLORE PAST YEARS -->
  <div class="years-card">
    <div class="years-header">
      <div class="years-info">
        <div class="years-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <div>
          <div class="years-title" id="years-title"></div>
          <div class="years-sub" id="years-sub"></div>
        </div>
      </div>
      <div class="year-tabs" id="year-tabs"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer-banner">
    <p id="footer-text"></p>
  </div>

  <!-- PROFICIENCY -->
  <div class="proficiency-section">
    <div class="card">
      <div class="prof-header">
        <div class="prof-title" id="prof-title"></div>
        <div class="prof-sub" id="prof-sub"></div>
      </div>
      <div class="prof-track" id="prof-track"></div>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   ┃                                                                      ┃
   ┃   📝  EDIT EVERYTHING BELOW — DON'T TOUCH CODE AFTER THIS BLOCK      ┃
   ┃                                                                      ┃
   ════════════════════════════════════════════════════════════════════════

   🟢 SAFE TO EDIT: Anything inside RECOGNITION_DATA below
   🔴 DON'T TOUCH: The render functions further down

   ───────────────────────────────────────────────────────────────────────
   QUICK GUIDE — WHAT YOU CAN CHANGE:

   ✏️ Hero title and description
   ✏️ Section titles & descriptions (Top Talent, Top Mover, Our Values)
   ✏️ Reward amounts and labels
   ✏️ Notes at the bottom of each section
   ✏️ Our Values names and definitions
   ✏️ Proficiency levels & descriptions
   ✏️ Footer banner text
   ✏️ Add/edit winners for any quarter or month
   ✏️ Add new quarters/months (just add a new key in periods{})
   ───────────────────────────────────────────────────────────────────────

   🎨 AVATAR COLORS available: "av-1" → "av-8"
      av-1=peach   av-2=lightblue  av-3=mint     av-4=lilac
      av-5=sand    av-6=pink       av-7=gray     av-8=skyblue

   🏷️  VALUE TAGS for Top Mover (must pair value + valueClass):
      Ownership      → "tag-own"
      Collaboration  → "tag-col"
      Innovation     → "tag-inn"
      Customer Focus → "tag-cus"
   ════════════════════════════════════════════════════════════════════════ */

const RECOGNITION_DATA = {

  // ════════ CONFIG ════════
  // SharePoint tenant URL — dùng để pull ảnh từ Teams/M365.

// --- Tab rendering ---
function renderTabs(containerId, periods, onClick) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  periods.forEach((period, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = period;
    btn.addEventListener('click', () => {
      el.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      onClick(period);
    });
    el.appendChild(btn);
  });
}

// Helper: build avatar HTML with optional SharePoint photo + initials fallback
function avatarHtml(person, placeholderClass) {
  const initials = person.initials || person.name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
  const colorClass = person.color || 'av-1';
  if (person.email) {
    const url = `${RECOGNITION_DATA.config.sharepointPhotoBase}?accountname=${encodeURIComponent(person.email)}&size=L`;
    // onerror removes the failed img, leaving initials + gradient visible
    return `<div class="${placeholderClass} ${colorClass}">${initials}<img src="${url}" alt="${person.name}" onerror="this.remove()"/></div>`;
  }
  return `<div class="${placeholderClass} ${colorClass}">${initials}</div>`;
}

function renderTalentGrid(period) {
  const grid = document.getElementById('talent-grid');
  const winners = RECOGNITION_DATA.topTalent.periods[period] || [];
  if (winners.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-title">Winners coming soon</div><div class="empty-state-sub">Top Talent for ${period} will be announced at the end of the quarter.</div></div>`;
    return;
  }
  grid.innerHTML = winners.map(w => `
    <div class="emp-card">
      ${avatarHtml(w, 'emp-avatar-placeholder')}
      <div class="emp-name">${w.name}</div>
      <div class="emp-role">${w.role}</div>
      <div class="emp-dept">${w.dept}</div>
    </div>
  `).join('');
}

function renderMoverGrid(period) {
  const grid = document.getElementById('mover-grid');
  const winners = RECOGNITION_DATA.topMover.periods[period] || [];
  if (winners.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-title">Winners coming soon</div><div class="empty-state-sub">Top Movers for ${period} will be announced at month-end.</div></div>`;
    return;
  }
  grid.innerHTML = winners.map(w => `
    <div class="mover-card">
      <div class="mover-top">
        ${avatarHtml(w, 'mover-avatar-placeholder')}
        <div>
          <div class="mover-name">${w.name}</div>
          <div class="mover-role">${w.role}</div>
          <div class="mover-dept">${w.dept}</div>
        </div>
      </div>
      <span class="value-tag ${w.valueClass}">${w.value}</span>
      <div class="mover-desc">${w.desc}</div>
    </div>
  `).join('');
}

// --- Filter periods that belong to a given year (period keys end with " 2025"/" 2026"/etc.) ---
function getPeriodsForYear(allPeriods, year) {
  return Object.keys(allPeriods).filter(k => k.endsWith(' ' + year));
}

// --- Switch the entire view to a given year ---
function setActiveYear(year) {
  // Top Talent
  const talentPeriods = getPeriodsForYear(RECOGNITION_DATA.topTalent.periods, year);
  if (talentPeriods.length === 0) {
    document.getElementById('talent-tabs').innerHTML = '';
    document.getElementById('talent-grid').innerHTML =
      `<div class="empty-state"><div class="empty-state-title">No Top Talent data for ${year}</div><div class="empty-state-sub">This year's recognition records are not yet available.</div></div>`;
  } else {
    renderTabs('talent-tabs', talentPeriods, renderTalentGrid);
    renderTalentGrid(talentPeriods[0]);
  }

  // Top Mover
  const moverPeriods = getPeriodsForYear(RECOGNITION_DATA.topMover.periods, year);
  if (moverPeriods.length === 0) {
    document.getElementById('mover-tabs').innerHTML = '';
    document.getElementById('mover-grid').innerHTML =
      `<div class="empty-state"><div class="empty-state-title">No Top Mover data for ${year}</div><div class="empty-state-sub">The Top Mover program may not have been active in this year.</div></div>`;
  } else {
    renderTabs('mover-tabs', moverPeriods, renderMoverGrid);
    renderMoverGrid(moverPeriods[0]);
  }
}

// --- Past Years tabs (auto-detect: startYear → current year, newest first) ---
function renderYearTabs() {
  const el = document.getElementById('year-tabs');
  const start = RECOGNITION_DATA.pastYears.startYear;
  const current = new Date().getFullYear();
  const years = [];
  for (let y = current; y >= start; y--) years.push(y.toString());
  if (years.length === 0) years.push(start.toString());

  el.innerHTML = '';
  years.forEach((year, i) => {
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (i === 0 ? ' active' : '');
    btn.textContent = year;
    btn.addEventListener('click', () => {
      el.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      setActiveYear(year);
    });
    el.appendChild(btn);
  });

  return years[0]; // most recent year, used for initial view
}

// --- Initial render: show the most recent year by default ---
const initialYear = renderYearTabs();
setActiveYear(initialYear);
