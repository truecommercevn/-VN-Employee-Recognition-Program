name: Sync Excel from SharePoint

on:
  # Manual run from Actions tab
  workflow_dispatch:

  # Auto-run every 30 minutes
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write   # allow pushing data.json back to repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install msal requests

      - name: Run sync script
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python scripts/sync_excel.py

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes — data.json is up to date."
          else
            git commit -m "chore: auto-sync data.json from SharePoint Excel"
            git push
            echo "✅ Pushed updated data.json"
          fi
